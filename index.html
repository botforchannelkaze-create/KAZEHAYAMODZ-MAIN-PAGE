<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaze Key System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0f16;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden; /* Iwas scroll */
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #111826;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Pantay na hati mula taas hanggang baba */
            padding: 30px 20px;
            text-align: center;
        }

        /* Rainbow Line */
        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, magenta, red);
            background-size: 400%;
            animation: rainbow 6s linear infinite;
        }

        @keyframes rainbow {
            0% { background-position: 0% }
            100% { background-position: 400% }
        }

        /* Header Section */
        header h1 {
            font-size: clamp(24px, 7vw, 36px);
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        header p {
            color: #aaa;
            font-size: 14px;
        }

        /* Button Section */
        .btn-group {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn:active { transform: scale(0.98); }

        .key { background: #00ffd5; color: #000; box-shadow: 0 0 15px rgba(0, 255, 213, 0.3); }
        .telegram { background: #229ED9; color: #fff; }
        .tutorial { background: #ff4444; color: #fff; }

        /* Footer Section */
        footer {
            max-width: 300px;
            margin: 0 auto;
        }

        .warning {
            font-size: 12px;
            color: #ffcc00;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .owner {
            font-size: 13px;
            color: #00ffd5;
            font-weight: bold;
            margin-top: 15px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>KAZE KEY SYSTEM</h1>
            <p>Free key generator for Kaze Loader</p>
        </header>

        <div class="btn-group">
            <a class="btn key" href="https://sub4unlock.io/dECAt">🔑 GET FREE KEY</a>
            <a class="btn telegram" href="https://t.me/KazeMainChannel">📢 JOIN TELEGRAM</a>
            <a class="btn tutorial" href="https://t.me/KazeTutorial/26">🎥 WATCH TUTORIAL</a>
        </div>

        <footer>
            <p class="warning">⚠️ Please do not bypass the link system. Each key supports the developer.</p>
            <p style="font-size: 11px; color: #666;">If errors occur, refresh the main page.</p>
            <span class="owner">Owner: @KAZEHAYAMODZ</span>
        </footer>
    </div>

</body>
</html>
