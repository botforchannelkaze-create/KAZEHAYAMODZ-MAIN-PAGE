<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAZEHAYAMODZ SECURE KEY SYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
height:100dvh;
width:100vw;
display:flex;
justify-content:center;
align-items:center;
background:#0b0f16;
font-family:'Segoe UI',sans-serif;
color:white;
overflow:hidden;
}

.container{
position:relative;
width:100%;
height:100dvh;
background:#111826;
display:flex;
flex-direction:column;
justify-content:space-between;
padding:35px 20px;
text-align:center;
}

/* TOP RAINBOW LINE */
.container::before{
content:"";
position:absolute;
top:0;
left:0;
right:0;
height:4px;
background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,magenta,red);
background-size:400%;
animation:rainbow 6s linear infinite;
z-index: 10;
}

@keyframes rainbow{
0%{background-position:0%}
100%{background-position:400%}
}

/* ===== BRANDING WITH NEON BORDER ===== */
header {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.brand-border-box {
    position: relative;
    padding: 2.5px;
    border-radius: 15px;
    overflow: hidden;
    background: #222;
    display: inline-block;
    box-shadow: 0 0 20px rgba(0, 255, 213, 0.25);
}

.brand-border-box::before {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: conic-gradient(transparent, transparent, transparent, #00ffd5);
    animation: rotateBorder 2s linear infinite;
}

@keyframes rotateBorder {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

header h1 {
    position: relative;
    z-index: 1;
    /* Ginamit ang Orbitron font dito */
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(18px, 5.8vw, 26px);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 18px 25px;
    background: #111826;
    border-radius: 13px;
    margin: 0;
    line-height: 1.3;
}

header p {
    color: #00ffd5;
    font-size: 11px;
    margin-top: 15px;
    font-weight: bold;
    letter-spacing: 1px;
    opacity: 0.8;
}

/* ===== BUTTONS ===== */
.btn-group {
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
}

.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 18px;
    margin-bottom: 12px;
    font-size: 15px;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    text-decoration: none;
    transition: 0.2s;
    text-transform: uppercase;
}

.btn:active { transform: scale(0.96); }

.key { background: #00ffd5; color: #000; box-shadow: 0 4px 15px rgba(0, 255, 213, 0.2); }
.telegram { background: #229ED9; color: #fff; }
.tutorial { background: #ff4444; color: #fff; }

/* ===== FOOTER & OWNER SECTION ===== */
footer {
    width: 100%;
    max-width: 340px;
    margin: 0 auto;
    padding-bottom: 15px;
}

.warning {
    font-size: 13px;
    color: #ffcc00;
    margin-bottom: 10px;
    line-height: 1.4;
    font-weight: bold;
}

/* Ibinalik ang dating Owner Style */
.owner {
    font-size: 15px;
    color: #00ffd5;
    font-weight: bold;
    display: block;
    cursor: pointer;
    text-decoration: underline;
}

.vip-btn-small {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 10px 20px;
    margin-top: 12px;
    font-size: 12px;
    font-weight: bold;
    border-radius: 8px;
    text-decoration: none;
    background: linear-gradient(45deg, #ffd700, #ff9f00);
    color: black;
}

/* ===== POPUP ===== */
.generator-info {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #1a2230;
    padding: 25px;
    border-radius: 20px;
    border: 2px solid #00ffd5;
    display: none;
    width: 85%;
    max-width: 300px;
    z-index: 100;
}

.generator-info.active { display: block; }

.close-info {
    margin-top: 15px;
    padding: 8px 20px;
    background: #ff4444;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand-border-box">
            <h1>KAZEHAYAMODZ<br>SECURE KEY SYSTEM</h1>
        </div>
        <p>Official Kaze Free Key Generator for Codm Injector</p>
    </header>

    <div class="btn-group">
        <a class="btn key" href="select.html">🔑 GET FREE KEY</a>
        <a class="btn telegram" href="https://t.me/KazeMainChannel">📢 JOIN TELEGRAM</a>
        <a class="btn tutorial" href="https://t.me/KazeTutorial/33">🎥 WATCH TUTORIAL</a>
    </div>

    <footer>
        <p class="warning">⚠️ Please report any issues to the owner.</p>
        <span class="owner" id="open-info">Developer: @KAZEHAYAMODZ</span>
        <a class="vip-btn-small" href="https://t.me/KAZEHAYAMODZ">⭐ BUY VIP KEY</a>
    </footer>
</div>

<div class="generator-info" id="info-box">
    Official free key generator.<br>
    Key duration: <b style="color:#00ffd5">12 hours</b>.<br><br>
    <button class="close-info" id="close-info">CLOSE</button>
</div>

<script>
    history.pushState(null,null,location.href);
    window.onpopstate=function(){history.go(1);};

    const openBtn=document.getElementById('open-info');
    const closeBtn=document.getElementById('close-info');
    const infoBox=document.getElementById('info-box');

    openBtn.onclick=()=>infoBox.classList.add('active');
    closeBtn.onclick=()=>infoBox.classList.remove('active');
</script>

</body>
</html>
