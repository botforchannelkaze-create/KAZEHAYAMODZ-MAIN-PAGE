<!DOCTYPE html>

<title>Kaze Key System</title>

<style>
/* ===== FULL SCREEN BODY ===== */
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b0f16;
  font-family:sans-serif;
  color:white;
  text-align:center;
}

/* ===== FULL SCREEN BOX WITH RAINBOW BORDER ===== */
.box{
  position:relative;
  width:100%;
  height:100%;
  padding:60px 20px;
  box-sizing:border-box;
  border-radius:0px;
  background:#111826;
  overflow:hidden;
}

.box::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:linear-gradient(
    90deg,
    red,
    orange,
    yellow,
    lime,
    cyan,
    blue,
    magenta,
    red
  );
  background-size:400%;
  z-index:-1;
  animation:rainbow 6s linear infinite;
}

@keyframes rainbow{
  0%{background-position:0%}
  100%{background-position:400%}
}

/* ===== HEADINGS ===== */
h1{
  font-size:50px;
  letter-spacing:2px;
  margin-bottom:10px;
}

p{
  color:#aaa;
  font-size:20px;
}

/* ===== BUTTONS ===== */
.btn{
  display:block;
  width:90%;
  max-width:400px;
  margin:20px auto;
  padding:20px;
  font-size:22px;
  font-weight:bold;
  border:none;
  border-radius:14px;
  cursor:pointer;
  text-decoration:none;
  transition:0.25s;
}

.btn:hover{
  transform:scale(1.06);
}

.key{
  background:#00ffd5;
  color:black;
  box-shadow:0 0 20px #00ffd5;
}

.telegram{
  background:#229ED9;
  color:white;
  box-shadow:0 0 20px #229ED9;
}

.tutorial{
  background:#ff4444;
  color:white;
  box-shadow:0 0 20px #ff4444;
}

.vip{
  background:#ff9900;
  color:white;
  box-shadow:0 0 20px #ff9900;
}

/* ===== MESSAGE ===== */
.message{
  margin-top:40px;
  font-size:16px;
  color:#999;
  line-height:1.7;
}

.owner{
  margin-top:30px;
  font-size:16px;
  color:#00ffd5;
  font-weight:bold;
  letter-spacing:1px;
}

</style>
</head>
