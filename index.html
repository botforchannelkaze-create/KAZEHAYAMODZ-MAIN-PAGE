<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaze Key System</title>

    <style>
        /* RESET & BASE STYLES */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0f16;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* FULL SCREEN CONTAINER */
        .box {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #111826;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        /* RAINBOW LINE AT THE TOP */
        .box::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, magenta, red);
            background-size: 400%;
            z-index: 10;
            animation: rainbow 6s linear infinite;
        }

        @keyframes rainbow {
            0% { background-position: 0% }
            100% { background-position: 400% }
        }

        /* TYPOGRAPHY */
        h1 {
            font-size: clamp(28px, 8vw, 45px);
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .subtitle {
            color: #aaa;
            font-size: clamp(14px, 4vw, 18px);
            margin-bottom: 30px;
        }

        /* BUTTONS */
        .btn-container {
            width: 100%;
            max-width: 350px; /* Width ng mga buttons para hindi sagad sa gilid */
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .key {
            background: #00ffd5;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 213, 0.4);
        }

        .telegram {
            background: #229ED9;
            color: white;
            box-shadow: 0 0 20px rgba(34, 158, 217, 0.4);
        }

        .tutorial {
            background: #ff4444;
            color: white;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.4);
        }

        /* FOOTER MESSAGE */
        .info-section {
            margin-top: 30px;
            max-width: 320px;
        }

        .warning {
            font-size: 14px;
            color: #ffcc00;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .message {
            font-size: 13px;
            color: #888;
            line-height: 1.6;
        }

        .owner {
            margin-top: 25px;
            font-size: 14px;
            color: #00ffd5;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0.8;
        }

    </style>
</head>

<body>

    <div class="box">
        <h1>KAZE KEY SYSTEM</h1>
        <p class="subtitle">Free key generator for Kaze Loader</p>

        <div class="btn-container">
            <a class="btn key" href="https://gplinks.co/KAZE-DAILY_FREEKEY">
                🔑 GET FREE KEY
            </a>

            <a class="btn telegram" href="https://t.me/KazeMainChannel">
                📢 JOIN TELEGRAM
            </a>

            <a class="btn tutorial" href="https://t.me/KazeTutorial/26">
                🎥 WATCH TUTORIAL
            </a>
        </div>

        <div class="info-section">
            <p class="warning">
                ⚠️ Please do not bypass the link system. Each key supports the developer.
            </p>
            <p class="message">
                If the key page refreshes or errors, simply generate again from the main page.
            </p>
        </div>

        <div class="owner">
            Owner: @KAZEHAYAMODZ
        </div>
    </div>

</body>
</html>
