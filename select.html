<head>
<meta charset="UTF-8">

body{
background:white;

.container{
text-align:center;

h2{

.arrow{

.menu.show{

}

.btn{
display:block;
width:100%;
padding:18px;
margin-bottom:15px;
border:none;
border-radius:10px;

cursor:pointer;
}

.injector{
background:#00ffd5;
}

.script{
background:#ccc;
}

onclick="location.href='https://sub4unlock.io/dECAt'">
🎮 CODM INJECTOR
</button>

<button class="btn script"
onclick="maintenance()">
📜 CODM SCRIPT
</button>

</div></div><script>

const arrow=document.getElementById("arrow");
const menu=document.getElementById("menu");

arrow.onclick=function(){

arrow.classList.toggle("rotate");
}

function maintenance(){

</script></body>
</html>
