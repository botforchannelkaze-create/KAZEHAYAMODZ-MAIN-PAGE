<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAZEHAYAMODZ | PANEL</title>
<style>

/* HACKER THEME SETUP */
body {
    background: #040608;
    background-image: 
        radial-gradient(circle at 50% 50%, rgba(0, 255, 213, 0.02), transparent 80%);
    font-family: 'Consolas', 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    color: #00ffd5;
    overflow: hidden;
}

/* COMPACT BRAND BOX */
.brand-box {
    position: relative;
    width: 320px; /* Mas maliit na width */
    padding: 2px;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 15px;
    background: #111;
    box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
}

.brand-box::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: conic-gradient(transparent, transparent, transparent, #ff0000);
    animation: rotate 2s linear infinite;
    top: -50%; left: -50%;
}

.brand-inner {
    position: relative;
    z-index: 1;
    background: #080808;
    padding: 12px; /* Manipis na padding */
    border-radius: 5px;
    text-align: center;
    font-size: 14px; /* Tamang laki lang ng font */
    font-weight: 900;
    color: white;
    letter-spacing: 2px;
    text-shadow: 0 0 5px #ff0000;
}

/* SLIM CONTAINER */
.container {
    background: rgba(10, 15, 20, 0.9);
    text-align: center;
    width: 280px; /* Slimmer look */
    padding: 20px;
    border-radius: 10px;
    border: 1px solid rgba(0, 255, 213, 0.2);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 {
    margin: 0 0 15px;
    font-size: 12px; /* Small terminal-style text */
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(0, 255, 213, 0.7);
}

/* MINIMALIST ARROW */
.arrow {
    font-size: 20px;
    cursor: pointer;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    width: 35px;
    height: 35px;
    border-radius: 4px; /* Squared corners for hacker look */
    border: 1px solid rgba(0, 255, 213, 0.3);
    transition: 0.3s;
    color: #00ffd5;
}

.arrow:hover {
    background: rgba(0, 255, 213, 0.1);
    box-shadow: 0 0 10px rgba(0, 255, 213, 0.3);
}

.arrow.rotate {
    transform: rotate(180deg);
    background: #00ffd5;
    color: black;
}

/* MENU SLIDE */
.menu {
    margin-top: 15px;
    display: none;
    animation: slideDown 0.3s ease-out;
}

@keyframes slideDown {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
}

.menu.show { display: block; }

/* COMPACT BUTTONS */
.btn {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 4px;
    font-size: 11px; /* Mas maliit na font */
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid #00ffd5;
    color: #00ffd5;
    transition: 0.2s;
    letter-spacing: 1px;
}

.btn:hover {
    background: #00ffd5;
    color: black;
    box-shadow: 0 0 15px rgba(0, 255, 213, 0.5);
}

.script {
    border-color: #444;
    color: #666;
}

.script:hover {
    background: #ff4444;
    color: white;
    border-color: #ff4444;
    box-shadow: 0 0 15px rgba(255, 68, 68, 0.5);
}

/* BETTER MAINTENANCE OVERLAY */
.maintenance-box {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(5, 8, 10, 0.95);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999;
    text-align: center;
}

.maintenance-box.show { display: flex; }

.m-text {
    font-size: 20px;
    font-weight: 900;
    color: #ff4444;
    letter-spacing: 5px;
    animation: flicker 0.5s infinite alternate;
}

.m-sub {
    font-size: 10px;
    color: #666;
    margin-top: 10px;
    text-transform: uppercase;
}

@keyframes flicker {
    0% { opacity: 1; text-shadow: 0 0 10px #ff0000; }
    100% { opacity: 0.6; text-shadow: 0 0 2px #ff0000; }
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

</style>
</head>
<body>

<div class="brand-box">
    <div class="brand-inner">KAZEHAYAMODZ FREE KEY</div>
</div>

<div class="container">
    <h2>[ ACCESS_PANEL ]</h2>
    <div class="arrow" id="arrow">⌄</div>
    
    <div class="menu" id="menu">
        <button class="btn" onclick="location.href='https://sub4unlock.io/dECAt'">
            > EXECUTE_INJECTOR
        </button>

        <button class="btn script" onclick="showMaintenance()">
            > LOAD_SCRIPT_V2
        </button>
    </div>
</div>

<div class="maintenance-box" id="maintenance" onclick="this.classList.remove('show')">
    <div class="m-text">SYSTEM_OFFLINE</div>
    <div class="m-sub">Maintenance in progress... Tap to close</div>
</div>

<script>
    const arrow = document.getElementById("arrow");
    const menu = document.getElementById("menu");
    const maintenance = document.getElementById("maintenance");

    arrow.onclick = function() {
        menu.classList.toggle("show");
        arrow.classList.toggle("rotate");
    }

    function showMaintenance() {
        maintenance.classList.add("show");
    }
</script>

</body>
</html>
