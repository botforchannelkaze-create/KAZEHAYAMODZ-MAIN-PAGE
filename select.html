<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAZEHAYAMODZ SELECTOR</title>
<style>

body {
    background: #0b0f16; /* Dark background para lumutang yung red neon */
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column; /* Vertical alignment */
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

/* BOX 1: BRAND HEADER WITH ROTATING RED BORDER */
.brand-box {
    position: relative;
    width: 350px;
    padding: 3px; /* Kapal ng spinning border */
    border-radius: 15px;
    overflow: hidden;
    margin-bottom: 20px; /* Space sa pagitan ng dalawang box */
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111;
}

.brand-box::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: conic-gradient(transparent, transparent, transparent, #ff0000);
    animation: rotate 1.5s linear infinite;
    z-index: 0;
}

.brand-inner {
    position: relative;
    z-index: 1;
    background: #0f1624;
    width: 100%;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    font-size: 20px;
    font-weight: 900;
    color: white;
    letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
}

/* BOX 2: PRODUCT SELECTOR (WHITE CONTAINER) */
.container {
    background: white;
    text-align: center;
    width: 350px;
    padding: 30px 20px;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
}

h2 {
    margin-top: 0;
    margin-bottom: 20px;
    font-size: 24px;
    color: #333;
    font-weight: 800;
}

/* Arrow Button */
.arrow {
    font-size: 40px;
    cursor: pointer;
    transition: 0.3s;
    user-select: none;
    display: inline-block;
    color: #333;
}

.arrow.rotate {
    transform: rotate(180deg);
}

/* Hidden Menu */
.menu {
    margin-top: 20px;
    display: none;
}

.menu.show {
    display: block;
}

/* Buttons */
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 18px;
    margin-bottom: 15px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, background 0.3s;
}

.btn:active {
    transform: scale(0.95);
}

.injector {
    background: #00ffd5;
    color: #000;
    box-shadow: 0 4px 10px rgba(0, 255, 213, 0.3);
}

.script {
    background: #ccc;
    color: #333;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

</style>
</head>
<body>

    <div class="brand-box">
        <div class="brand-inner">
            KAZEHAYAMODZ FREE KEY
        </div>
    </div>

    <div class="container">
        <h2>Select Product</h2>
        
        <div class="arrow" id="arrow">⬇️</div>

        <div class="menu" id="menu">
            <button class="btn injector" onclick="location.href='https://sub4unlock.io/dECAt'">
                🎮 CODM INJECTOR
            </button>

            <button class="btn script" onclick="maintenance()">
                📜 CODM SCRIPT
            </button>
        </div>
    </div>

<script>
    const arrow = document.getElementById("arrow");
    const menu = document.getElementById("menu");

    arrow.onclick = function() {
        menu.classList.toggle("show");
        arrow.classList.toggle("rotate");
    }

    function maintenance() {
        alert("CODM SCRIPT KEY SYSTEM\n\nCurrently under maintenance.\nFree key coming soon!");
    }
</script>

</body>
</html>
