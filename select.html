.arrow{

/* MENU */

.menu{

.btn{

.script:hover{

.maintenance-box{

left:50%;

}

.maintenance-box.show{

}

/* ROTATE */

@keyframes rotate{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}
