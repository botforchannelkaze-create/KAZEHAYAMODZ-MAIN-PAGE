<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAZEHAYAMODZ | PANEL</title><style>

body{
background:#040608;
background-image:
radial-gradient(circle at 50% 50%, rgba(0,255,213,0.03), transparent 80%);
font-family:Consolas, Courier New, monospace;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
margin:0;
color:#00ffd5;
}

/* TOP HEADER AREA */

.header{
position:fixed;
top:20px;
width:100%;
display:flex;
justify-content:center;
z-index:10;
}

/* BRAND BOX */

.brand-box{
position:relative;
width:420px;
padding:3px;
border-radius:10px;
overflow:hidden;
background:#111;
box-shadow:0 0 20px rgba(255,0,0,0.25);
}

/* ROTATING RED BORDER */

.brand-box::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:conic-gradient(
transparent,
transparent,
transparent,
#ff0000
);
animation:rotate 2s linear infinite;
}

.brand-inner{
position:relative;
background:#080808;
padding:22px;
border-radius:8px;
text-align:center;
font-size:24px;
font-weight:900;
color:white;
letter-spacing:3px;
text-shadow:0 0 10px #ff0000;
}

/* ACCESS PANEL */

.container{
margin-top:140px;
background:rgba(10,15,20,0.95);
text-align:center;
width:360px;
padding:40px 25px;
border-radius:12px;
border:1px solid rgba(0,255,213,0.3);
box-shadow:
0 0 40px rgba(0,0,0,0.7),
inset 0 0 20px rgba(0,255,213,0.1);
}

h2{
margin:0 0 25px;
font-size:22px;
letter-spacing:5px;
text-transform:uppercase;
color:#00ffd5;
text-shadow:0 0 10px rgba(0,255,213,0.6);
}

/* ARROW */

.arrow{
font-size:28px;
cursor:pointer;
display:inline-flex;
justify-content:center;
align-items:center;
width:45px;
height:45px;
border-radius:6px;
border:1px solid rgba(0,255,213,0.4);
transition:0.3s;
}

.arrow:hover{
background:#00ffd5;
color:black;
box-shadow:0 0 15px rgba(0,255,213,0.6);
}

.arrow.rotate{
transform:rotate(180deg);
background:#00ffd5;
color:black;
}

/* MENU */

.menu{
margin-top:20px;
display:none;
animation:slide 0.3s ease;
}

.menu.show{
display:block;
}

@keyframes slide{
from{opacity:0; transform:translateY(-10px)}
to{opacity:1; transform:translateY(0)}
}

/* BUTTONS */

.btn{
display:flex;
justify-content:center;
align-items:center;
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:6px;
font-size:13px;
font-weight:bold;
text-transform:uppercase;
cursor:pointer;
background:rgba(0,0,0,0.5);
border:1px solid #00ffd5;
color:#00ffd5;
transition:0.2s;
letter-spacing:1px;
}

.btn:hover{
background:#00ffd5;
color:black;
box-shadow:0 0 18px rgba(0,255,213,0.6);
}

.script{
border-color:#444;
color:#666;
}

.script:hover{
background:#ff4444;
color:white;
border-color:#ff4444;
box-shadow:0 0 15px rgba(255,68,68,0.6);
}

/* MAINTENANCE */

.maintenance-box{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(5,8,10,0.96);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:100;
}

.maintenance-box.show{
display:flex;
}

.m-text{
font-size:30px;
font-weight:900;
color:#ff4444;
letter-spacing:6px;
animation:flicker 0.6s infinite alternate;
}

@keyframes flicker{
0%{opacity:1; text-shadow:0 0 12px #ff0000}
100%{opacity:0.5; text-shadow:0 0 3px #ff0000}
}

/* ROTATION */

@keyframes rotate{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

</style></head><body><div class="header">
<div class="brand-box">
<div class="brand-inner">
KAZEHAYAMODZ FREE KEY
</div>
</div>
</div><div class="container"><h2>ACCESS PANEL</h2><div class="arrow" id="arrow">⌄</div><div class="menu" id="menu"><button class="btn"
onclick="location.href='https://sub4unlock.io/dECAt'">
EXECUTE CODM INJECTOR
</button>

<button class="btn script"
onclick="showMaintenance()">
LOAD CODM SCRIPT
</button>

</div></div><div class="maintenance-box" id="maintenance" onclick="this.classList.remove('show')">
<div class="m-text">MAINTENANCE</div>
</div><script>

const arrow=document.getElementById("arrow");
const menu=document.getElementById("menu");
const maintenance=document.getElementById("maintenance");

arrow.onclick=function(){
menu.classList.toggle("show");
arrow.classList.toggle("rotate");
}

function showMaintenance(){
maintenance.classList.add("show");
}

</script></body>
</html>
