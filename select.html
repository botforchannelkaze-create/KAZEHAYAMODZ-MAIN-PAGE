<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Product | Gamer Menu</title>
    <style>
        /* Modern & Dark Theme */
        body {
            background: #0f172a; /* Dark Blue-Gray */
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(to right, #00ffd5, #0088ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Arrow Button with Pulse Effect */
        .arrow {
            font-size: 30px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            background: rgba(255,255,255,0.1);
            width: 60px;
            height: 60px;
            line-height: 60px;
            border-radius: 50%;
            margin: 0 auto;
            display: block;
        }

        .arrow:hover {
            background: rgba(0, 255, 213, 0.2);
            transform: scale(1.1);
        }

        .arrow.rotate {
            transform: rotate(180deg);
            background: #00ffd5;
            color: #0f172a;
        }

        /* Hidden Menu with Smooth Slide */
        .menu {
            margin-top: 25px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out, opacity 0.3s;
            opacity: 0;
        }

        .menu.show {
            max-height: 300px;
            opacity: 1;
        }

        /* Styled Buttons */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .injector {
            background: linear-gradient(135deg, #00ffd5 0%, #00ccaa 100%);
            color: #062c26;
            box-shadow: 0 4px 15px rgba(0, 255, 213, 0.3);
        }

        .injector:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 255, 213, 0.5);
        }

        .script {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .script:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Footer text */
        .footer-note {
            font-size: 12px;
            color: #64748b;
            margin-top: 20px;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>Select Product</h2>
    
    <div class="arrow" id="arrow">▼</div>

    <div class="menu" id="menu">
        <button class="btn injector" onclick="location.href='https://sub4unlock.io/dECAt'">
            <span style="font-size: 20px;">🎮</span> CODM INJECTOR
        </button>

        <button class="btn script" onclick="maintenance()">
            <span style="font-size: 20px;">📜</span> CODM SCRIPT
        </button>
        
        <p class="footer-note">Choose a tool to begin injection</p>
    </div>
</div>

<script>
    const arrow = document.getElementById("arrow");
    const menu = document.getElementById("menu");

    arrow.onclick = function() {
        menu.classList.toggle("show");
        arrow.classList.toggle("rotate");
    }

    function maintenance() {
        // SweetAlert-style alert using native JS
        alert("⚠️ CODM SCRIPT STATUS\n\nSystem is currently under maintenance.\nPlease wait for the free key update!");
    }
</script>

</body>
</html>
