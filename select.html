<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAZEHAYAMODZ | Select Product</title>
<style>

body {
    background: #f0f2f5; /* Light gray para lumutang yung white card */
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

/* The spinning red border container */
.neon-wrapper {
    position: relative;
    width: 350px;
    padding: 5px; /* Kapal ng spinning border */
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ccc; /* Fallback color */
}

/* Red spinning animation */
.neon-wrapper::before {
    content: '';
    position: absolute;
    width: 150%;
    height: 400%;
    background: conic-gradient(#ff0000, transparent, transparent, #ff0000);
    animation: rotate 3s linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* The actual white container */
.container {
    position: relative;
    background: white;
    text-align: center;
    width: 100%;
    padding: 30px 20px;
    border-radius: 15px;
    z-index: 1; /* Para nasa ibabaw ng spinning border */
}

/* Custom Message sa Taas */
.brand-header {
    font-size: 14px;
    font-weight: 800;
    color: #ff0000;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 5px;
}

h2 {
    margin-top: 0;
    margin-bottom: 20px;
    font-size: 26px;
    color: #333;
}

/* Arrow Button */
.arrow {
    font-size: 40px;
    cursor: pointer;
    transition: 0.3s;
    user-select: none;
    display: inline-block;
}

.arrow.rotate {
    transform: rotate(180deg);
}

/* Hidden Menu */
.menu {
    margin-top: 20px;
    display: none;
}

.menu.show {
    display: block;
}

/* Buttons */
.btn {
    display: block;
    width: 100%;
    padding: 18px;
    margin-bottom: 15px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s;
}

.btn:active {
    transform: scale(0.98);
}

.injector {
    background: #00ffd5;
    color: #000;
}

.script {
    background: #e0e0e0;
    color: #666;
}

</style>
</head>
<body>

<div class="neon-wrapper">
    <div class="container">
        <div class="brand-header">KAZEHAYAMODZ FREE KEY</div>
        
        <h2>Select Product</h2>
        
        <div class="arrow" id="arrow">⬇️</div>

        <div class="menu" id="menu">
            <button class="btn injector" onclick="location.href='https://sub4unlock.io/dECAt'">
                🎮 CODM INJECTOR
            </button>

            <button class="btn script" onclick="maintenance()">
                📜 CODM SCRIPT
            </button>
        </div>
    </div>
</div>

<script>
    const arrow = document.getElementById("arrow");
    const menu = document.getElementById("menu");

    arrow.onclick = function() {
        menu.classList.toggle("show");
        arrow.classList.toggle("rotate");
    }

    function maintenance() {
        alert("CODM SCRIPT KEY SYSTEM\n\nCurrently under maintenance.\nFree key coming soon!");
    }
</script>

</body>
</html>
