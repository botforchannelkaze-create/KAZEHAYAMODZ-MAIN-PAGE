<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAZEHAYAMODZ | PREMIUM PANEL</title>

<style>
:root {
    --panel-width: 280px;
    --brand-top-space: 40px;
    --gap-between: 25px;
}

body {
    background: #05070a;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: var(--brand-top-space);
    min-height: 100vh;
    margin: 0;
    color: #e0e0e0;
}

body::before {
    content: "";
    position: fixed;
    top: 50%; left: 50%;
    width: 300px; height: 300px;
    background: rgba(76, 207, 255, 0.05);
    filter: blur(80px);
    transform: translate(-50%, -50%);
    z-index: -1;
}

/* BRAND BOX */
.brand-box {
    position: relative;
    width: var(--panel-width);
    padding: 1.5px;
    border-radius: 8px;
    overflow: hidden;
    background: #111;
    margin-bottom: var(--gap-between);
}

.brand-box::before {
    content: "";
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: conic-gradient(transparent, transparent, transparent, #4ccfff);
    animation: rotate 2.5s linear infinite;
}

.brand-inner {
    position: relative;
    z-index: 1;
    background: #0a0a0a;
    padding: 14px;
    border-radius: 7px;
    text-align: center;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #fff;
}

/* MAIN BOX */
.container {
    background: #0d1117;
    text-align: center;
    width: var(--panel-width);
    padding: 25px 20px;
    border-radius: 12px;
}

/* TITLE */
h2 {
    margin: 0 0 15px;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #4ccfff;
}

/* TUTORIAL */
.tuts {
    font-size: 9px;
    line-height: 1.6;
    margin-bottom: 20px;
    color: #777;
    padding: 12px;
    border-left: 2px solid #4ccfff;
}

/* ARROW */
.arrow {
    font-size: 18px;
    cursor: pointer;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(76,207,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #4ccfff;
}

.arrow:hover {
    background: #4ccfff;
    color: #000;
}

/* MENU */
.menu {
    margin-top: 20px;
    display: none;
}

.menu.show {
    display: block;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: bold;
    cursor: pointer;
    background: #4ccfff;
    border: none;
    color: #000;
}

.btn:hover {
    box-shadow: 0 0 15px #4ccfff;
}

.script {
    background: transparent;
    border: 1px solid #222;
    color: #999;
}

.script:hover {
    border-color: #4ccfff;
    color: #4ccfff;
    background: rgba(76,207,255,0.05);
}

/* ANIMATION */
@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="brand-box">
    <div class="brand-inner">PLEASE SELECT YOUR KEY TYPE</div>
</div>

<div class="container">
    <h2>SYSTEM DASHBOARD</h2>

    <div class="tuts">
        <b>01</b> PRESS THE ARROW<br>
        <b>02</b> SELECT KEY<br>
        <b>03</b> DONE
    </div>

    <div class="arrow" id="arrow">⌄</div>

    <div class="menu" id="menu">
        
        <!-- INJECTOR -->
        <button class="btn" onclick="window.open('https://sub4unlock.io/dECAt','_blank')">
            GET FREE KEY INJECTOR
        </button>

        <!-- SCRIPT -->
        <button class="btn script" onclick="window.open('https://sub4unlock.io/UTqol','_blank')">
            GET FREE KEY SCRIPT
        </button>

    </div>
</div>

<script>
const arrow = document.getElementById("arrow");
const menu = document.getElementById("menu");

arrow.onclick = function() {
    menu.classList.toggle("show");
}
</script>

</body>
</html>
