<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAZEHAYAMODZ | PANEL</title>
<style>

/* ===== CLEAN CYBER DARK THEME ===== */
body {
    background: #05070a;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    color: #e0e0e0;
}

/* Background Subtle Glow */
body::before {
    content: "";
    position: fixed;
    top: 50%; left: 50%;
    width: 300px; height: 300px;
    background: rgba(0, 255, 213, 0.05);
    filter: blur(100px);
    transform: translate(-50%, -50%);
    z-index: -1;
}

/* ===== SLIM BRAND BOX (BOX 1) ===== */
.brand-box {
    position: relative;
    width: 300px; /* Slimmer */
    padding: 1.5px;
    border-radius: 8px;
    overflow: hidden;
    background: #111;
    margin-bottom: 12px;
}

.brand-box::before {
    content: "";
    position: absolute;
    top: -100%; left: -100%;
    width: 200%; height: 300%;
    background: conic-gradient(transparent, transparent, transparent, #ff4444);
    animation: rotate 2.5s linear infinite;
}

.brand-inner {
    position: relative;
    z-index: 1;
    background: #0a0a0a;
    padding: 12px;
    border-radius: 7px;
    text-align: center;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #fff;
    text-shadow: 0 0 5px rgba(255, 68, 68, 0.5);
}

/* ===== COMPACT PANEL (BOX 2) ===== */
.container {
    background: #0d1117;
    text-align: center;
    width: 300px; /* Fixed Slim Width */
    padding: 30px 35px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 {
    margin: 0 0 15px;
    font-size: 11px;
    letter-spacing: 4px;
    color: #00ffd5;
    opacity: 0.8;
}

/* Tutorial Text - Cleaner */
.tuts {
    font-size: 10px;
    line-height: 1.6;
    margin-bottom: 20px;
    color: #888;
    background: rgba(255, 255, 255, 0.02);
    padding: 10px;
    border-radius: 6px;
    text-align: left;
}

.tuts b { color: #00ffd5; }

/* Minimalist Arrow */
.arrow {
    font-size: 18px;
    cursor: pointer;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(0, 255, 213, 0.05);
    border: 1px solid rgba(0, 255, 213, 0.2);
    transition: 0.3s;
    color: #00ffd5;
}

.arrow:hover {
    background: #00ffd5;
    color: #000;
}

.arrow.rotate {
    transform: rotate(180deg);
}

/* Menu Slide */
.menu {
    margin-top: 20px;
    display: none;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
}

.menu.show { display: block; }

/* Premium Buttons */
.btn {
    display: block;
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    cursor: pointer;
    background: #00ffd5;
    border: none;
    color: #000;
    transition: 0.2s;
    letter-spacing: 1px;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 255, 213, 0.3);
}

.script {
    background: transparent;
    border: 1px solid #333;
    color: #666;
}

.script:hover {
    border-color: #ff4444;
    color: #ff4444;
    background: rgba(255, 68, 68, 0.05);
}

/* Minimalist Maintenance */
.maintenance-box {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(5, 7, 10, 0.98);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
}

.maintenance-box.show { display: flex; }

.m-text {
    font-size: 18px;
    font-weight: 900;
    color: #ff4444;
    letter-spacing: 5px;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

</style>
</head>
<body>

<div class="brand-box">
    <div class="brand-inner">KAZEHAYAMODZ FREE KEY</div>
</div>

<div class="container">
    <h2>DASHBOARD</h2>
    
    <div class="tuts">
        <b>01</b> TAP THE ARROW BELOW<br>
        <b>02</b> CHOOSE YOUR PRODUCT<br>
        <b>03</b> WAIT FOR INJECTION
    </div>

    <div class="arrow" id="arrow">⌄</div>

    <div class="menu" id="menu">
        <button class="btn" onclick="location.href='https://sub4unlock.io/dECAt'">
            GET FREE KEY INJECTOR
        </button>

        <button class="btn script" onclick="showMaintenance()">
            GET FREE KEY SCRIPT
        </button>
    </div>
</div>

<div class="maintenance-box" id="maintenance" onclick="this.classList.remove('show')">
    <div class="m-text">⚠️MAINTENANCE</div>
    <div style="font-size: 9px; color: #444; margin-top: 10px;">TAP TO RETURN</div>
</div>

<script>
    const arrow = document.getElementById("arrow");
    const menu = document.getElementById("menu");
    const maintenance = document.getElementById("maintenance");

    arrow.onclick = function() {
        menu.classList.toggle("show");
        arrow.classList.toggle("rotate");
    }

    function showMaintenance() {
        maintenance.classList.add("show");
    }
</script>

</body>
</html>
